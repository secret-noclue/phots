<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStudio | Mirrored & Scrollable</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Scrollable Wrapper for Long Strips */
        .viewport-container {
            position: relative;
            width: 100%;
            max-height: 70vh; /* Limits height on mobile */
            overflow-y: auto; /* Makes strip scrollable */
            border-radius: 16px;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        /* Mirroring logic */
        video, #canvas {
            width: 100%;
            display: block;
            transform: scaleX(-1); /* Visual Mirroring */
        }

        #timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            font-weight: 800;
            z-index: 10;
            pointer-events: none;
        }

        .controls {
            margin-top: 1.5rem;
            display: grid;
            gap: 1rem;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        select, button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: #334155;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-capture { background: var(--primary); grid-column: span 2; font-size: 1.1rem; }
        .btn-share { background: #10b981; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="text-align: center; margin-top: 0;">🎞️ Strip Studio</h2>

        <div class="viewport-container">
            <div id="timer" class="hidden">3</div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <div id="ui-setup" class="controls">
            <div class="btn-grid">
                <select id="mode">
                    <option value="1">Single Photo</option>
                    <option value="3">3-Photo Strip</option>
                    <option value="4">4-Photo Grid</option>
                </select>
                <select id="filter">
                    <option value="none">Normal</option>
                    <option value="grayscale(100%)">Noir (B&W)</option>
                    <option value="sepia(100%)">Retro Sepia</option>
                    <option value="saturate(200%) brightness(1.1)">Vibrant</option>
                    <option value="hue-rotate(90deg)">Acid Trip</option>
                    <option value="contrast(150%) brightness(0.8)">Dramatic</option>
                    <option value="blur(2px) saturate(1.5)">Soft Dream</option>
                    <option value="invert(1)">Negative</option>
                </select>
            </div>
            <button id="btn-snap" class="btn-capture">Start Capture</button>
        </div>

        <div id="ui-post" class="controls hidden">
            <button id="btn-share" class="btn-share">📤 Share to Email / Photos</button>
            <div class="btn-grid">
                <button onclick="location.reload()">🔄 Retake</button>
                <button id="btn-download" style="background:#6366f1">💾 Download</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const snapBtn = document.getElementById('btn-snap');
        
        let stream;
        let images = [];

        async function init() {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
        }

        snapBtn.onclick = async () => {
            const count = parseInt(document.getElementById('mode').value);
            images = [];
            snapBtn.disabled = true;

            for (let i = 0; i < count; i++) {
                // Timer
                timerEl.classList.remove('hidden');
                for (let t = 3; t > 0; t--) {
                    timerEl.innerText = t;
                    await new Promise(r => setTimeout(r, 800));
                }
                timerEl.classList.add('hidden');

                // Capture to temporary invisible canvas
                const temp = document.createElement('canvas');
                temp.width = video.videoWidth;
                temp.height = video.videoHeight;
                const tCtx = temp.getContext('2d');
                
                // MIRROR THE ACTUAL DATA
                tCtx.translate(temp.width, 0);
                tCtx.scale(-1, 1);
                
                tCtx.filter = document.getElementById('filter').value;
                tCtx.drawImage(video, 0, 0, temp.width, temp.height);
                images.push(temp.toDataURL('image/png'));
                
                if (i < count - 1) await new Promise(r => setTimeout(r, 1000));
            }
            renderStrip();
        };

        function renderStrip() {
            const w = 600; // High res base width
            const h = 800; // Base height per photo
            const pad = 40;
            
            canvas.width = w + (pad * 2);
            canvas.height = (h * images.length) + (pad * (images.length + 1)) + 80;

            // Background
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            images.forEach((imgSrc, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, pad, pad + (i * (h + pad)), w, h);
                    if (i === images.length - 1) finalize();
                };
                img.src = imgSrc;
            });
        }

        function finalize() {
            // Remove the CSS mirroring from canvas so the already-mirrored data displays correctly
            canvas.style.transform = "none";
            
            ctx.fillStyle = "#aaa";
            ctx.font = "bold 24px Arial";
            ctx.textAlign = "center";
            ctx.fillText("PRO STUDIO STRIP • 2024", canvas.width/2, canvas.height - 35);

            video.classList.add('hidden');
            canvas.classList.remove('hidden');
            document.getElementById('ui-setup').classList.add('hidden');
            document.getElementById('ui-post').classList.remove('hidden');
        }

        // Sharing logic
        document.getElementById('btn-share').onclick = async () => {
            const blob = await (await fetch(canvas.toDataURL())).blob();
            const file = new File([blob], 'strip.png', { type: 'image/png' });

            if (navigator.share) {
                navigator.share({ files: [file], title: 'My Photo Strip' });
            } else {
                window.location.href = `mailto:?subject=My Photo Strip&body=See attached!`;
            }
        };

        document.getElementById('btn-download').onclick = () => {
            const link = document.createElement('a');
            link.download = 'photostrip.png';
            link.href = canvas.toDataURL();
            link.click();
        };

        init();
    </script>
</body>
</html>
