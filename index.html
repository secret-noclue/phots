<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProStudio | Web Photobooth</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #ec4899;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            color: var(--light);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Container & Layout */
        .app-container {
            width: 90%;
            max-width: 1000px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .viewer-pane {
            position: relative;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            aspect-ratio: 3/4;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid #334155;
        }

        video, canvas {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* UI Overlays */
        #timer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-weight: 800;
            color: white;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: none;
            z-index: 10;
        }

        #flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
        }

        /* Controls */
        .toolbar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #94a3b8;
        }

        select, button {
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        select {
            background: #334155;
            color: white;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(0); }
        button:disabled { background: #475569; cursor: not-allowed; }

        .btn-capture { background: var(--secondary); font-size: 1.1rem; }
        .btn-download { background: #10b981; }
        .btn-retake { background: #64748b; }

        .hidden { display: none !important; }

        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        .flash-active { animation: flashAnim 0.5s ease-out; }
    </style>
</head>
<body>

    <div class="app-container">
        <header style="margin-bottom: 1.5rem;">
            <h1 style="margin:0; font-weight: 800; background: linear-gradient(to right, #818cf8, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">PRO STUDIO</h1>
            <p style="color: #94a3b8; margin: 5px 0 0 0;">Professional Web Photobooth</p>
        </header>

        <div class="viewer-pane">
            <div id="timer">3</div>
            <div id="flash"></div>
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
        </div>

        <div class="toolbar">
            <div class="control-group">
                <label>Layout Mode</label>
                <select id="photoMode">
                    <option value="1">Single Portrait</option>
                    <option value="3">Classic 3-Strip</option>
                    <option value="4">Quad Grid</option>
                </select>
            </div>

            <div class="control-group">
                <label>Artistic Filter</label>
                <select id="filter">
                    <option value="none">Natural</option>
                    <option value="grayscale(100%)">Noir (B&W)</option>
                    <option value="sepia(60%)">Vintage Sepia</option>
                    <option value="contrast(1.2) brightness(1.1) saturate(1.1)">Studio Bright</option>
                    <option value="contrast(1.1) sepia(20%) hue-rotate(-10deg)">Warm Film</option>
                    <option value="invert(100%)">X-Ray</option>
                </select>
            </div>

            <div class="control-group" style="justify-content: flex-end;">
                <button id="capture" class="btn-capture">📸 Take Photo</button>
            </div>
            
            <div class="control-group" style="justify-content: flex-end;">
                <button id="flip" style="background:#475569">🔄 Flip</button>
            </div>
        </div>

        <div id="postCapture" class="toolbar hidden">
            <button id="download" class="btn-download">💾 Download Strip</button>
            <button id="retake" class="btn-retake">🔄 New Session</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const flashEl = document.getElementById('flash');
        
        // Buttons
        const captureBtn = document.getElementById('capture');
        const downloadBtn = document.getElementById('download');
        const retakeBtn = document.getElementById('retake');
        const flipBtn = document.getElementById('flip');
        const postCaptureActions = document.getElementById('postCapture');

        let stream;
        let images = [];
        let currentFacingMode = 'user';

        async function initCamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: currentFacingMode, width: 720, height: 960 } 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access denied. Please enable permissions.");
            }
        }

        function triggerFlash() {
            flashEl.classList.remove('flash-active');
            void flashEl.offsetWidth; // Trigger reflow
            flashEl.classList.add('flash-active');
        }

        async function takePhoto() {
            const count = parseInt(document.getElementById('photoMode').value);
            images = [];
            captureBtn.disabled = true;

            for (let i = 0; i < count; i++) {
                // Countdown
                timerEl.style.display = 'block';
                for (let j = 3; j > 0; j--) {
                    timerEl.innerText = j;
                    await new Promise(r => setTimeout(r, 800));
                }
                timerEl.style.display = 'none';

                // Flash & Capture
                triggerFlash();
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = video.videoWidth;
                tempCanvas.height = video.videoHeight;
                const tCtx = tempCanvas.getContext('2d');
                
                // Mirror for front camera
                if(currentFacingMode === 'user') {
                    tCtx.translate(tempCanvas.width, 0);
                    tCtx.scale(-1, 1);
                }
                
                tCtx.filter = document.getElementById('filter').value;
                tCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
                images.push(tempCanvas.toDataURL('image/png'));
                
                if (i < count - 1) await new Promise(r => setTimeout(r, 1000));
            }

            renderStrip();
        }

        function renderStrip() {
            const padding = 40;
            const photoW = 480;
            const photoH = 640;
            
            canvas.width = photoW + (padding * 2);
            canvas.height = (photoH * images.length) + (padding * (images.length + 1)) + 60;

            // White background for strip
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            images.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    ctx.drawImage(img, padding, padding + (i * (photoH + padding)), photoW, photoH);
                    
                    if (i === images.length - 1) {
                        // Branding
                        ctx.fillStyle = "#cbd5e1";
                        ctx.font = "bold 20px Inter";
                        ctx.textAlign = "center";
                        ctx.fillText("PRO STUDIO SESSION", canvas.width/2, canvas.height - 30);
                        
                        video.classList.add('hidden');
                        canvas.classList.remove('hidden');
                        postCaptureActions.classList.remove('hidden');
                    }
                };
                img.src = src;
            });
        }

        captureBtn.addEventListener('click', takePhoto);
        
        retakeBtn.addEventListener('click', () => {
            video.classList.remove('hidden');
            canvas.classList.add('hidden');
            postCaptureActions.classList.add('hidden');
            captureBtn.disabled = false;
        });

        flipBtn.addEventListener('click', () => {
            currentFacingMode = currentFacingMode === 'user' ? 'environment' : 'user';
            initCamera();
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `pro-studio-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
        });

        document.getElementById('filter').addEventListener('change', (e) => {
            video.style.filter = e.target.value;
        });

        initCamera();
    </script>
</body>
</html>
